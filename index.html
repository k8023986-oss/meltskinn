<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MELT — 15-Day Skin Challenge</title>
<meta name="description" content="India's first daily skincare challenge. 8 steps. 15 days. Zero bottles. Morning + Night routine in biodegradable kraft sachets.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F0E8;
    --charcoal: #2C2C2C;
    --kraft: #B89660;
    --kraft-light: #D4B896;
    --pink: #E8D5CC;
    --white: #FDFCFA;
    --gold: #C9A96E;
    --text-muted: #7A7268;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--white);
    color: var(--charcoal);
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 5%;
    background: rgba(253,252,250,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(180,150,96,0.15);
  }

  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--charcoal);
    text-decoration: none;
  }

  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a {
    font-size: 0.82rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--charcoal); }

  .nav-cta {
    background: var(--charcoal);
    color: var(--cream) !important;
    padding: 10px 22px;
    border-radius: 2px;
    font-size: 0.8rem !important;
    letter-spacing: 0.12em !important;
  }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    padding: 120px 5% 60px;
    gap: 4rem;
    background: var(--white);
  }

  .hero-text { max-width: 520px; }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--cream);
    border: 1px solid var(--kraft-light);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--kraft);
    margin-bottom: 1.8rem;
  }

  .hero-badge span { width: 5px; height: 5px; background: var(--gold); border-radius: 50%; }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 4.5vw, 3.8rem);
    line-height: 1.12;
    font-weight: 700;
    margin-bottom: 1.4rem;
    color: var(--charcoal);
  }

  .hero h1 em {
    font-style: italic;
    color: var(--kraft);
  }

  .hero-sub {
    font-size: 1rem;
    line-height: 1.7;
    color: var(--text-muted);
    margin-bottom: 2.2rem;
    max-width: 420px;
  }

  .hero-pills {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 2.4rem;
  }

  .pill {
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 12px;
    border: 1px solid rgba(180,150,96,0.35);
    border-radius: 20px;
    color: var(--text-muted);
  }

  .hero-actions { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }

  .btn-primary {
    background: var(--charcoal);
    color: var(--cream);
    padding: 16px 32px;
    font-size: 0.88rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 2px;
    transition: background 0.2s, transform 0.15s;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-primary:hover { background: #1a1a1a; transform: translateY(-1px); }

  .btn-secondary {
    color: var(--charcoal);
    font-size: 0.85rem;
    text-decoration: none;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: gap 0.2s;
  }
  .btn-secondary:hover { gap: 10px; }

  .hero-trust {
    margin-top: 2rem;
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  .hero-image {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hero-image img {
    width: 100%;
    max-width: 580px;
    border-radius: 4px;
    box-shadow: 0 24px 64px rgba(44,44,44,0.12);
  }

  .hero-image-badge {
    position: absolute;
    bottom: 30px;
    left: -20px;
    background: var(--white);
    border: 1px solid var(--kraft-light);
    padding: 14px 20px;
    border-radius: 4px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    font-size: 0.78rem;
  }

  .hero-image-badge strong {
    display: block;
    font-size: 1.1rem;
    font-family: 'Playfair Display', serif;
    color: var(--kraft);
  }

  /* STRIPS */
  .strip {
    background: var(--charcoal);
    color: var(--cream);
    padding: 14px 5%;
    display: flex;
    gap: 3rem;
    overflow: hidden;
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .strip-inner {
    display: flex;
    gap: 4rem;
    animation: marquee 18s linear infinite;
    white-space: nowrap;
  }

  @keyframes marquee {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .strip-item { display: flex; align-items: center; gap: 10px; }
  .strip-dot { width: 4px; height: 4px; background: var(--gold); border-radius: 50%; }

  /* PROBLEM */
  .section {
    padding: 90px 5%;
  }

  .section-label {
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--kraft);
    margin-bottom: 1rem;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.9rem, 3.5vw, 3rem);
    line-height: 1.2;
    margin-bottom: 1rem;
  }

  .section-title em { font-style: italic; color: var(--kraft); }

  .problem-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3rem;
    align-items: center;
    margin-top: 3rem;
  }

  .problem-cards { display: flex; flex-direction: column; gap: 1.2rem; }

  .problem-card {
    display: flex;
    gap: 1.2rem;
    padding: 20px 24px;
    background: var(--cream);
    border-radius: 4px;
    border-left: 3px solid var(--kraft-light);
    transition: border-color 0.2s;
  }
  .problem-card:hover { border-color: var(--kraft); }

  .problem-num {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--kraft-light);
    font-weight: 700;
    line-height: 1;
    min-width: 40px;
  }

  .problem-card h3 {
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }

  .problem-card p {
    font-size: 0.82rem;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .problem-image img {
    width: 100%;
    border-radius: 4px;
    box-shadow: 0 16px 48px rgba(44,44,44,0.1);
  }

  /* SACHETS SECTION */
  .sachets-section {
    background: var(--cream);
    padding: 90px 5%;
  }

  .sachets-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem;
    align-items: center;
    margin-top: 3rem;
  }

  .sachets-image img {
    width: 100%;
    border-radius: 4px;
    box-shadow: 0 20px 56px rgba(44,44,44,0.1);
  }

  .sachets-steps { display: flex; flex-direction: column; gap: 0; }

  .step-group-label {
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--kraft);
    padding: 16px 0 8px;
    border-top: 1px solid var(--kraft-light);
    margin-top: 1.5rem;
  }

  .step-group-label:first-child { margin-top: 0; border-top: none; padding-top: 0; }

  .step-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 12px 0;
    border-bottom: 1px solid rgba(180,150,96,0.2);
  }

  .step-num {
    width: 28px; height: 28px;
    background: var(--charcoal);
    color: var(--cream);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    font-weight: 500;
    flex-shrink: 0;
  }

  .step-info h4 { font-size: 0.88rem; font-weight: 500; }
  .step-info span { font-size: 0.75rem; color: var(--text-muted); }

  /* HOW IT WORKS */
  .how-section { padding: 90px 5%; }

  .how-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem;
    align-items: center;
    margin-top: 3rem;
  }

  .how-steps { display: flex; flex-direction: column; gap: 2rem; }

  .how-step { display: flex; gap: 1.5rem; }

  .how-step-num {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    font-weight: 700;
    color: var(--kraft-light);
    line-height: 1;
    min-width: 50px;
  }

  .how-step h3 { font-size: 1rem; font-weight: 500; margin-bottom: 6px; }
  .how-step p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; }

  .how-image img {
    width: 100%;
    border-radius: 4px;
    box-shadow: 0 20px 56px rgba(44,44,44,0.1);
  }

  /* PRICING */
  .pricing-section {
    background: var(--charcoal);
    padding: 90px 5%;
    color: var(--cream);
  }

  .pricing-section .section-label { color: var(--gold); }
  .pricing-section .section-title { color: var(--cream); }
  .pricing-section .section-title em { color: var(--gold); }

  .pricing-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-top: 3rem;
    max-width: 780px;
  }

  .price-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    padding: 32px;
    transition: border-color 0.2s, transform 0.2s;
    cursor: pointer;
  }

  .price-card:hover { border-color: var(--gold); transform: translateY(-3px); }

  .price-card.featured {
    background: rgba(201,169,110,0.12);
    border-color: var(--gold);
    position: relative;
  }

  .featured-tag {
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--gold);
    color: var(--charcoal);
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 10px;
    font-weight: 500;
    white-space: nowrap;
  }

  .price-name {
    font-size: 0.75rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--kraft-light);
    margin-bottom: 0.8rem;
  }

  .price-amount {
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    font-weight: 700;
    color: var(--cream);
    line-height: 1;
    margin-bottom: 0.4rem;
  }

  .price-sub {
    font-size: 0.78rem;
    color: rgba(245,240,232,0.5);
    margin-bottom: 1.6rem;
  }

  .price-features {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 2rem;
  }

  .price-features li {
    font-size: 0.82rem;
    color: rgba(245,240,232,0.75);
    display: flex;
    align-items: flex-start;
    gap: 8px;
    line-height: 1.5;
  }

  .price-features li::before {
    content: '✦';
    color: var(--gold);
    font-size: 0.6rem;
    margin-top: 3px;
    flex-shrink: 0;
  }

  .btn-buy {
    display: block;
    width: 100%;
    background: var(--cream);
    color: var(--charcoal);
    padding: 14px;
    text-align: center;
    font-size: 0.82rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 2px;
    font-weight: 500;
    transition: background 0.2s, transform 0.15s;
    font-family: 'DM Sans', sans-serif;
    border: none;
    cursor: pointer;
  }

  .btn-buy:hover { background: var(--white); transform: translateY(-1px); }

  .price-card.featured .btn-buy {
    background: var(--gold);
    color: var(--charcoal);
  }

  .price-card.featured .btn-buy:hover { background: #d4b87a; }

  .pricing-trust {
    margin-top: 2rem;
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .trust-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.78rem;
    color: rgba(245,240,232,0.5);
  }

  /* WHY MELT */
  .why-section { padding: 90px 5%; background: var(--cream); }

  .why-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
    margin-top: 3rem;
  }

  .why-card {
    background: var(--white);
    padding: 28px;
    border-radius: 4px;
    border-top: 3px solid transparent;
    transition: border-color 0.2s, transform 0.2s;
  }

  .why-card:hover { border-color: var(--kraft); transform: translateY(-4px); }

  .why-icon {
    font-size: 1.4rem;
    margin-bottom: 1rem;
  }

  .why-card h3 {
    font-size: 0.92rem;
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: 0.02em;
  }

  .why-card p {
    font-size: 0.8rem;
    color: var(--text-muted);
    line-height: 1.6;
  }

  /* FAQ */
  .faq-section { padding: 90px 5%; }

  .faq-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-top: 3rem;
    max-width: 900px;
  }

  .faq-item {
    border: 1px solid rgba(180,150,96,0.2);
    border-radius: 4px;
    overflow: hidden;
  }

  .faq-q {
    width: 100%;
    background: none;
    border: none;
    padding: 18px 20px;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--charcoal);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    transition: background 0.15s;
  }

  .faq-q:hover { background: var(--cream); }

  .faq-arrow {
    font-size: 1rem;
    transition: transform 0.2s;
    color: var(--kraft);
    flex-shrink: 0;
  }

  .faq-item.open .faq-arrow { transform: rotate(45deg); }

  .faq-a {
    display: none;
    padding: 0 20px 16px;
    font-size: 0.82rem;
    color: var(--text-muted);
    line-height: 1.7;
    border-top: 1px solid rgba(180,150,96,0.15);
    padding-top: 14px;
  }

  .faq-item.open .faq-a { display: block; }

  /* FINAL CTA */
  .final-cta {
    background: var(--charcoal);
    padding: 90px 5%;
    color: var(--cream);
    text-align: center;
  }

  .final-cta .section-title { color: var(--cream); }
  .final-cta .section-title em { color: var(--gold); }

  .final-cta p {
    color: rgba(245,240,232,0.6);
    font-size: 0.95rem;
    margin: 1.2rem 0 2.5rem;
  }

  .final-buttons {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn-gold {
    background: var(--gold);
    color: var(--charcoal);
    padding: 16px 36px;
    font-size: 0.88rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 2px;
    font-weight: 500;
    transition: background 0.2s, transform 0.15s;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-gold:hover { background: #d4b87a; transform: translateY(-2px); }

  .btn-outline-light {
    background: transparent;
    color: var(--cream);
    padding: 16px 36px;
    font-size: 0.88rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 2px;
    border: 1px solid rgba(245,240,232,0.3);
    transition: border-color 0.2s;
  }
  .btn-outline-light:hover { border-color: var(--cream); }

  /* FOOTER */
  footer {
    background: #1a1a1a;
    padding: 40px 5%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }

  footer .nav-logo { color: var(--cream); font-size: 1.2rem; }

  footer p {
    font-size: 0.75rem;
    color: rgba(245,240,232,0.35);
  }

  footer a {
    font-size: 0.75rem;
    color: rgba(245,240,232,0.4);
    text-decoration: none;
    letter-spacing: 0.08em;
    transition: color 0.2s;
  }
  footer a:hover { color: var(--gold); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(44,44,44,0.7);
    backdrop-filter: blur(4px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--white);
    border-radius: 6px;
    padding: 40px;
    width: 100%;
    max-width: 480px;
    position: relative;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .modal-close {
    position: absolute;
    top: 16px; right: 20px;
    background: none; border: none;
    font-size: 1.4rem;
    cursor: pointer;
    color: var(--text-muted);
  }

  .modal-badge {
    display: inline-block;
    background: var(--cream);
    border: 1px solid var(--kraft-light);
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--kraft);
    margin-bottom: 1rem;
  }

  .modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    margin-bottom: 0.5rem;
  }

  .modal-product {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-bottom: 1.8rem;
    padding-bottom: 1.2rem;
    border-bottom: 1px solid rgba(180,150,96,0.2);
  }

  .modal-product strong { color: var(--kraft); }

  .form-group { margin-bottom: 1rem; }

  .form-group label {
    display: block;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .form-group input,
  .form-group textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid rgba(180,150,96,0.3);
    border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    background: var(--white);
    color: var(--charcoal);
    transition: border-color 0.2s;
    outline: none;
  }

  .form-group input:focus,
  .form-group textarea:focus { border-color: var(--kraft); }

  .form-group textarea { resize: vertical; min-height: 80px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }

  .modal-submit {
    width: 100%;
    background: var(--charcoal);
    color: var(--cream);
    border: none;
    padding: 15px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    margin-top: 1.2rem;
    transition: background 0.2s;
  }

  .modal-submit:hover { background: #1a1a1a; }
  .modal-submit:disabled { opacity: 0.6; cursor: not-allowed; }

  .modal-note {
    font-size: 0.72rem;
    color: var(--text-muted);
    text-align: center;
    margin-top: 0.8rem;
    line-height: 1.5;
  }

  /* MOBILE */
  @media (max-width: 768px) {
    .nav-links { display: none; }

    .hero {
      grid-template-columns: 1fr;
      padding: 100px 5% 50px;
      gap: 2.5rem;
    }

    .hero-image-badge { display: none; }

    .problem-grid,
    .sachets-grid,
    .how-grid { grid-template-columns: 1fr; gap: 2.5rem; }

    .problem-image { order: -1; }

    .pricing-grid { grid-template-columns: 1fr; }

    .why-grid { grid-template-columns: 1fr 1fr; }

    .faq-grid { grid-template-columns: 1fr; }

    .final-buttons { flex-direction: column; align-items: center; }

    footer { flex-direction: column; text-align: center; gap: 1.5rem; }
